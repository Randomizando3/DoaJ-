<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anunciar - Doa Ja</title>
    <link rel="icon" type="image/png" href="img/logo-minimalista.png">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo"><img src="img/logo.png" alt="Logo Doa Ja"></a>
        <button class="menu-toggle" id="mobile-menu" type="button"><i class="fas fa-bars"></i></button>
        <ul class="nav-links" id="nav-links">
            <li><a href="index.html"><i class="fas fa-home"></i> INICIO</a></li>
            <li><a href="chat.html"><i class="fas fa-comments"></i> CHAT</a></li>
            <li><a href="meus-anuncios.html"><i class="fas fa-list"></i> MEUS ANUNCIOS</a></li>
            <li><a href="anunciar.html" class="btn-anunciar"><i class="fas fa-plus-circle"></i> ANUNCIAR GRATIS</a></li>
            <li><a href="login.html" class="btn-login" id="login-icon"><i class="fas fa-user"></i></a></li>
        </ul>
    </nav>

    <main class="page">
        <section class="page-header">
            <div>
                <h1>Novo anuncio</h1>
                <p>Formulario visual. Na versao sem backend ele nao salva no banco.</p>
            </div>
        </section>

        <section class="form-card">
            <form id="form-anuncio">
                <div class="form-grid">
                    <div class="form-group"><label>Nome do produto</label><input type="text" required></div>
                    <div class="form-group"><label>Localizacao</label><input type="text" required></div>
                    <div class="form-group"><label>Foto</label><input type="text" placeholder="https://"></div>
                    <div class="form-group">
                        <label>Categoria</label>
                        <select required>
                            <option value="">Escolha</option>
                            <option>Brinquedo</option>
                            <option>Camiseta</option>
                            <option>Calca</option>
                            <option>Calcado</option>
                        </select>
                    </div>
                </div>
                <div class="form-group"><label>Descricao</label><textarea rows="6" required></textarea></div>
                <button class="btn-primary-page" type="submit">Salvar anuncio</button>
            </form>
        </section>
    </main>

    <script src="js/dados.js"></script>
    <script src="js/site.js"></script>
</body>
</html>
