<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produto - Doa Ja</title>
    <link rel="icon" type="image/png" href="img/logo-minimalista.png">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo"><img src="img/logo.png" alt="Logo Doa Ja"></a>
        <button class="menu-toggle" id="mobile-menu" type="button"><i class="fas fa-bars"></i></button>
        <ul class="nav-links" id="nav-links">
            <li><a href="index.html"><i class="fas fa-home"></i> INICIO</a></li>
            <li><a href="chat.html"><i class="fas fa-comments"></i> CHAT</a></li>
            <li><a href="meus-anuncios.html"><i class="fas fa-list"></i> MEUS ANUNCIOS</a></li>
            <li><a href="anunciar.html" class="btn-anunciar"><i class="fas fa-plus-circle"></i> ANUNCIAR GRATIS</a></li>
            <li><a href="login.html" class="btn-login" id="login-icon"><i class="fas fa-user"></i></a></li>
        </ul>
    </nav>

    <main class="page">
        <section class="detail-layout">
            <div class="detail-image">
                <img id="produto-foto" src="" alt="">
            </div>

            <div class="detail-info">
                <span class="badge badge-disponivel">disponivel</span>
                <h1 id="produto-nome"></h1>
                <p id="produto-descricao"></p>
                <ul class="detail-list">
                    <li><strong>Categoria:</strong> <span id="produto-categoria"></span></li>
                    <li><strong>Localizacao:</strong> <span id="produto-localizacao"></span></li>
                    <li><strong>Doador:</strong> <span id="produto-doador"></span></li>
                    <li><strong>Avaliacao:</strong> <span id="produto-avaliacao"></span></li>
                </ul>
                <a href="chat.html" class="btn-primary-page">Quero essa doacao</a>
            </div>
        </section>
    </main>

    <script src="js/dados.js"></script>
    <script src="js/site.js"></script>
</body>
</html>
