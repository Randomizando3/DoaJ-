<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar - Doa Ja</title>
    <link rel="icon" type="image/png" href="img/logo-minimalista.png">
    <link rel="stylesheet" href="css/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="auth-body">
    <a href="index.html" class="btn-voltar" title="Voltar">
        <i class="fas fa-arrow-left"></i>
    </a>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <a href="index.html" class="logo-text">Doa Ja</a>
                <p>Entre para anunciar e acompanhar as doacoes.</p>
            </div>

            <div class="auth-alert hidden" id="aviso-login"></div>

            <form class="auth-form-page" id="form-login">
                <div class="input-group">
                    <i class="fas fa-envelope icon"></i>
                    <input type="email" id="email" placeholder="Seu email" required>
                </div>

                <div class="input-group">
                    <i class="fas fa-lock icon"></i>
                    <input type="password" id="senha" placeholder="Sua senha" required>
                    <button class="toggle-password" type="button" data-target="senha">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>

                <button type="submit" class="btn-primary-auth">Entrar</button>

                <div class="auth-links">
                    <a href="registro.html">Criar conta</a>
                </div>
            </form>

            <div class="login-box-info">
                <h3>Usuarios de teste</h3>
                <p>admin@doaja.com / 123456</p>
                <p>doador@doaja.com / 123456</p>
                <p>receptor@doaja.com / 123456</p>
            </div>
        </div>
    </div>

    <script src="js/dados.js"></script>
    <script src="js/site.js"></script>
</body>
</html>
