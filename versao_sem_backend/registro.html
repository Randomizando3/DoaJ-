<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Doa Ja</title>
    <link rel="icon" type="image/png" href="img/logo-minimalista.png">
    <link rel="stylesheet" href="css/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="auth-body">
    <a href="index.html" class="btn-voltar" title="Voltar">
        <i class="fas fa-arrow-left"></i>
    </a>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <a href="index.html" class="logo-text">Doa Ja</a>
                <p>Cadastro visual para teste rapido.</p>
            </div>

            <form class="auth-form-page" id="form-registro">
                <div class="input-group">
                    <i class="fas fa-user icon"></i>
                    <input type="text" placeholder="Nome completo" required>
                </div>

                <div class="input-group">
                    <i class="fas fa-envelope icon"></i>
                    <input type="email" placeholder="Seu email" required>
                </div>

                <div class="input-group">
                    <i class="fas fa-lock icon"></i>
                    <input type="password" id="senha-registro" placeholder="Crie uma senha" required>
                    <button class="toggle-password" type="button" data-target="senha-registro">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>

                <div class="input-group">
                    <i class="fas fa-location-dot icon"></i>
                    <input type="text" placeholder="Sua cidade" required>
                </div>

                <button type="submit" class="btn-primary-auth">Criar conta</button>

                <div class="auth-links">
                    <a href="login.html">Ja tenho conta</a>
                </div>
            </form>
        </div>
    </div>

    <script src="js/dados.js"></script>
    <script src="js/site.js"></script>
</body>
</html>
